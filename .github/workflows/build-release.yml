name: Build & Release

# 推送 v* 标签时触发，也支持手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: '是否创建草稿 Release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  # ─────────────────────────── 编译 & 打包 ───────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (arm64)
          - os: macos-latest
            platform: mac
            arch: arm64
            label: macOS-arm64

          # macOS Intel (x64)
          # macos-13 是最后一个 x64 runner，macos-latest 已切换到 arm64
          - os: macos-13
            platform: mac
            arch: x64
            label: macOS-x64

          # Windows x64
          - os: windows-latest
            platform: win
            arch: x64
            label: Windows-x64

          # Linux x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            label: Linux-x64

    runs-on: ${{ matrix.os }}
    name: Build · ${{ matrix.label }}

    env:
      # CI 环境使用官方下载源，速度更稳定
      # electron_mirror        — Electron 运行时本体
      # electron_builder_binaries_mirror — electron-builder 打包工具（NSIS、7zip、fpm 等）
      electron_mirror: https://github.com/electron/electron/releases/download/v
      electron_builder_binaries_mirror: https://github.com/electron-userland/electron-builder-binaries/releases/download/
      # 跳过 macOS 代码签名（未配置证书时避免打包失败）
      CSC_IDENTITY_AUTO_DISCOVERY: false
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 下载 age 预编译二进制（全平台）
      - name: Download age binaries (all platforms)
        run: node scripts/download-age-bins.mjs --all

      # ── 打包 ──
      - name: Build & Package (macOS)
        if: matrix.platform == 'mac'
        run: npm run dist:mac -- --${{ matrix.arch }}

      - name: Build & Package (Windows)
        if: matrix.platform == 'win'
        run: npm run dist:win -- --${{ matrix.arch }}

      - name: Build & Package (Linux)
        if: matrix.platform == 'linux'
        run: npm run dist:linux -- --${{ matrix.arch }}

      # ── 生成 SHA256 校验文件（macOS / Linux）──
      - name: Generate SHA256SUMS (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd release
          find . -maxdepth 2 -type f \( \
            -name "*.dmg" -o \
            -name "*.zip" -o \
            -name "*.AppImage" -o \
            -name "*.deb" \
          \) | sort | while read -r f; do
            shasum -a 256 "$f" | sed 's|./[^/]*/||' >> SHA256SUMS.txt
          done
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS.txt

      # ── 生成 SHA256 校验文件（Windows）──
      - name: Generate SHA256SUMS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $outFile = "release\SHA256SUMS.txt"
          Get-ChildItem -Path release -Recurse -Depth 2 -Include "*.exe" |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
              "$hash  $($_.Name)" | Out-File -Append -FilePath $outFile -Encoding utf8NoBOM
            }
          Write-Host "--- SHA256SUMS ---"
          Get-Content $outFile

      # ── 上传产物 ──
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.label }}
          retention-days: 3
          path: |
            release/**/*.dmg
            release/**/*.zip
            release/**/*.exe
            release/**/*.AppImage
            release/**/*.deb
            release/**/SHA256SUMS.txt

  # ─────────────────────────── 发布 Release ───────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # 仅标签推送才自动发布；手动触发也执行
    if: always() && needs.build.result == 'success'

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge SHA256SUMS from all platforms
        run: |
          mkdir -p dist-upload
          # 收集所有安装包到同一目录
          find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.zip" -o \
            -name "*.exe" -o \
            -name "*.AppImage" -o \
            -name "*.deb" \
          \) -exec cp {} dist-upload/ \;
          # 合并并去重 SHA256SUMS
          find artifacts -name "SHA256SUMS.txt" -exec cat {} \; \
            | sort -u > dist-upload/SHA256SUMS.txt
          echo "=== 待发布文件 ==="
          ls -lh dist-upload/
          echo ""
          echo "=== SHA256SUMS ==="
          cat dist-upload/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: ${{ inputs.draft == 'true' }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist-upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
