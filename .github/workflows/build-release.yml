name: Build & Release

# 推送 v* 标签时触发，也支持手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: '是否创建草稿 Release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────── 编译 & 打包 ───────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (arm64)
          - os: macos-latest
            platform: mac
            arch: arm64
            label: macOS-arm64

          # macOS Intel (x64)
          # GitHub Hosted macOS x64 runner 已逐步下线；在 macos-latest 上直接产出 x64 包
          - os: macos-latest
            platform: mac
            arch: x64
            label: macOS-x64

          # Windows x64
          - os: windows-latest
            platform: win
            arch: x64
            label: Windows-x64

          # Linux x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
            label: Linux-x64

    runs-on: ${{ matrix.os }}
    name: Build · ${{ matrix.label }}

    env:
      # CI 环境使用官方下载源，速度更稳定
      # electron_builder_binaries_mirror — electron-builder 打包工具（NSIS、7zip、fpm 等）
      electron_builder_binaries_mirror: https://github.com/electron-userland/electron-builder-binaries/releases/download/
      # 强制让 JavaScript actions 使用 Node.js 24（避免 Node 20 弃用警告）
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # 跳过 macOS 代码签名（未配置证书时避免打包失败）
      CSC_IDENTITY_AUTO_DISCOVERY: false
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 优先使用仓库中已提交的 age 预编译二进制；缺失时再自动下载 latest
      - name: Ensure age binaries exist
        shell: bash
        run: |
          target=""
          required=()

          if [ "${{ matrix.platform }}" = "mac" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            target="darwin/arm64"
            required=(
              "resources/bin/darwin/arm64/age"
              "resources/bin/darwin/arm64/age-keygen"
              "resources/bin/darwin/arm64/age-plugin-batchpass"
            )
          elif [ "${{ matrix.platform }}" = "mac" ] && [ "${{ matrix.arch }}" = "x64" ]; then
            target="darwin/x64"
            required=(
              "resources/bin/darwin/x64/age"
              "resources/bin/darwin/x64/age-keygen"
              "resources/bin/darwin/x64/age-plugin-batchpass"
            )
          elif [ "${{ matrix.platform }}" = "win" ] && [ "${{ matrix.arch }}" = "x64" ]; then
            target="win32/x64"
            required=(
              "resources/bin/win32/x64/age.exe"
              "resources/bin/win32/x64/age-keygen.exe"
              "resources/bin/win32/x64/age-plugin-batchpass.exe"
            )
          elif [ "${{ matrix.platform }}" = "linux" ] && [ "${{ matrix.arch }}" = "x64" ]; then
            target="linux/x64"
            required=(
              "resources/bin/linux/x64/age"
              "resources/bin/linux/x64/age-keygen"
              "resources/bin/linux/x64/age-plugin-batchpass"
            )
          else
            echo "Unsupported matrix target: platform=${{ matrix.platform }}, arch=${{ matrix.arch }}"
            exit 1
          fi

          missing=0
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "Missing age binary: $f"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "Downloading missing target only: ${target}"
            node scripts/download-age-bins.mjs --targets "${target}"
          else
            echo "Age binaries for ${target} are present, skipping download."
          fi

      # ── 打包 ──
      - name: Build & Package (macOS)
        if: matrix.platform == 'mac'
        run: npm run dist:mac -- --${{ matrix.arch }} --publish never

      - name: Build & Package (Windows)
        if: matrix.platform == 'win'
        run: npm run dist:win -- --${{ matrix.arch }} --publish never

      - name: Cleanup internal age exes (avoid artifact confusion)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $names = @('age.exe', 'age-keygen.exe', 'age-plugin-batchpass.exe')
          foreach ($n in $names) {
            $p = Join-Path 'release' $n
            if (Test-Path $p) {
              Write-Host "Removing top-level internal binary from release/: $n"
              Remove-Item $p -Force
            }
          }

      - name: Build & Package (Linux)
        if: matrix.platform == 'linux'
        run: npm run dist:linux -- --${{ matrix.arch }} --publish never

      # ── 生成 SHA256 校验文件（macOS / Linux）──
      - name: Generate SHA256SUMS (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd release
          find . -maxdepth 2 -type f \( \
            -name "*.dmg" -o \
            -name "*.zip" -o \
            -name "*.AppImage" -o \
            -name "*.deb" \
          \) | sort | while read -r f; do
            shasum -a 256 "$f" | sed 's|./[^/]*/||' >> SHA256SUMS.txt
          done
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS.txt

      # ── 生成 SHA256 校验文件（Windows）──
      - name: Generate SHA256SUMS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $outFile = "release\SHA256SUMS.txt"
          Get-ChildItem -Path release -File -Filter "*.exe" |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
              "$hash  $($_.Name)" | Out-File -Append -FilePath $outFile -Encoding utf8NoBOM
            }
          Write-Host "--- SHA256SUMS ---"
          Get-Content $outFile

      # ── 上传产物 ──
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.label }}
          retention-days: 3
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/SHA256SUMS.txt

  # ─────────────────────────── 发布 Release ───────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    env:
      # 强制让 JavaScript actions 使用 Node.js 24（避免 Node 20 弃用警告）
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # 仅在推送 v* 标签时才发布 Release；
    # workflow_dispatch 手动触发（通常在分支上测试打包）时跳过此 Job
    if: always() && needs.build.result == 'success' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge SHA256SUMS from all platforms
        run: |
          mkdir -p dist-upload
          # 收集所有安装包到同一目录
          shopt -s nullglob
          for f in artifacts/*/release/*.dmg artifacts/*/release/*.zip artifacts/*/release/*.exe artifacts/*/release/*.AppImage artifacts/*/release/*.deb; do
            base="$(basename "$f")"
            # 防止把“应用内部资源里的 age.exe”等误当成安装包附件上传
            if [[ "$base" == "age.exe" || "$base" == "age-keygen.exe" || "$base" == "age-plugin-batchpass.exe" ]]; then
              echo "Skip internal binary in Release: $base"
              continue
            fi
            cp "$f" dist-upload/
          done

          # 重新基于实际安装包文件计算 SHA256，避免出现空的 SHA256SUMS.txt
          cd dist-upload
          rm -f SHA256SUMS.txt
          # sha256sum 在有匹配文件时才会生成内容；nullglob 确保没匹配也不会误报
          sha256sum ./*.dmg ./*.zip ./*.exe ./*.AppImage ./*.deb 2>/dev/null > SHA256SUMS.txt || true
          if [ ! -s SHA256SUMS.txt ]; then
            echo "SHA256SUMS.txt is empty (no installers found)."
            exit 1
          fi
          echo "=== 待发布文件 ==="
          ls -lh .
          echo ""
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: ${{ inputs.draft == 'true' }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist-upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
